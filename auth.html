<!doctype html>
<html lang="fr" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap"
      rel="stylesheet"
    />
    <title>磨き Migaki</title>
    <style>
      :root {
        --or: #d4a017;
        --bg-card: #18150f;
        --border: rgba(212, 160, 23, 0.14);
        --texte: #e8dfc8;
        --texte-secondaire: #a09070;
        --font-titre: 'Cinzel', serif;
      }

      [data-theme='dark'] {
        --bg: #0c0b08;
        --bg-input: #22201a;
      }

      body {
        background: var(--bg, #0c0b08);
        color: var(--texte, #e8dfc8);
        font-family: 'Crimson Pro', Georgia, serif;
        margin: 0;
      }
      .auth-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .auth-box {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 40px;
        width: 100%;
        max-width: 400px;
        position: relative;
      }
      .auth-title {
        font-family: var(--font-titre);
        font-size: 1.8rem;
        color: var(--or);
        text-align: center;
        margin-bottom: 8px;
      }
      .auth-subtitle {
        text-align: center;
        color: var(--texte-secondaire);
        margin-bottom: 32px;
        font-size: 0.9rem;
      }
      .auth-tabs {
        display: flex;
        margin-bottom: 24px;
        border-bottom: 1px solid var(--border);
      }
      .auth-tab {
        flex: 1;
        padding: 10px;
        background: none;
        border: none;
        color: var(--texte-secondaire);
        cursor: pointer;
        font-size: 0.95rem;
        border-bottom: 2px solid transparent;
        margin-bottom: -1px;
        transition: all 0.2s;
      }
      .auth-tab.active {
        color: var(--or);
        border-bottom-color: var(--or);
      }
      .auth-field {
        margin-bottom: 16px;
      }
      .auth-field label {
        display: block;
        font-size: 0.85rem;
        color: var(--texte-secondaire);
        margin-bottom: 6px;
      }
      .auth-field input {
        width: 100%;
        padding: 10px 14px;
        background: var(--bg-input, #1a1a1a);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--texte);
        font-size: 0.95rem;
        box-sizing: border-box;
        transition: border-color 0.2s;
      }
      .auth-field input:focus {
        outline: none;
        border-color: var(--or);
      }
      .auth-btn {
        width: 100%;
        padding: 12px;
        background: var(--or);
        color: #1a1100;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
        margin-top: 8px;
        transition: opacity 0.2s;
      }
      .auth-btn:hover { opacity: 0.85; }
      .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }

      .auth-message {
        margin-top: 16px;
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 0.9rem;
        display: none;
      }
      .auth-message.error   { background: #3a1010; color: #ff6b6b; display: block; }
      .auth-message.success { background: #0f2a1a; color: #51cf66; display: block; }

      #btn-lang {
        position: absolute;
        top: 16px;
        right: 16px;
        background: rgba(212, 160, 23, 0.08);
        border: 1px solid rgba(212, 160, 23, 0.2);
        border-radius: 20px;
        padding: 4px 10px;
        font-size: 15px;
        cursor: pointer;
        transition: all 0.2s;
        line-height: 1;
      }
      #btn-lang:hover {
        background: rgba(212, 160, 23, 0.18);
        border-color: var(--or);
      }
    </style>
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-box">
        <button id="btn-lang">🇬🇧</button>

        <div class="auth-title">磨き MIGAKI</div>
        <div class="auth-subtitle" id="auth-subtitle"></div>

        <div class="auth-tabs">
          <button class="auth-tab active" id="tab-login"></button>
          <button class="auth-tab" id="tab-signup"></button>
        </div>

        <div id="form-login">
          <div class="auth-field">
            <label id="label-login-email"></label>
            <input type="email" id="login-email" />
          </div>
          <div class="auth-field">
            <label id="label-login-password"></label>
            <input type="password" id="login-password" placeholder="••••••••" />
          </div>
          <button class="auth-btn" id="btn-login"></button>
        </div>
        <div style="text-align: center; margin-top: 14px">
          <a href="#" id="lien-forgot" style="font-size: 0.85rem; color: #a09070; text-decoration: none"></a>
        </div>

        <div id="form-signup" style="display: none">
          <div class="auth-field">
            <label id="label-signup-email"></label>
            <input type="email" id="signup-email" />
          </div>
          <div class="auth-field">
            <label id="label-signup-password"></label>
            <input type="password" id="signup-password" />
          </div>
          <div class="auth-field">
            <input type="password" id="register-password-confirm" required />
          </div>
          <div class="auth-field">
            <label id="label-signup-pseudo"></label>
            <input type="text" id="signup-pseudo" />
          </div>
          <button class="auth-btn" id="btn-signup"></button>
        </div>

        <div class="auth-message" id="auth-message"></div>
      </div>
    </div>

    <script type="module">
      import { supabase } from './supabase.js';
      import { initI18n, t, getLang, setLang } from './i18n.js';

      await initI18n();
      const lang = getLang();

      // ── Traductions ──
      document.getElementById('auth-subtitle').textContent             = t('auth_sous_titre');
      document.getElementById('tab-login').textContent                 = t('auth_tab_connexion');
      document.getElementById('tab-signup').textContent                = t('auth_tab_inscription');
      document.getElementById('label-login-email').textContent         = t('auth_email');
      document.getElementById('label-login-password').textContent      = t('auth_mot_de_passe');
      document.getElementById('btn-login').textContent                 = t('auth_btn_connexion');
      document.getElementById('lien-forgot').textContent               = t('auth_mdp_oublie');
      document.getElementById('label-signup-email').textContent        = t('auth_email');
      document.getElementById('label-signup-password').textContent     = t('auth_mot_de_passe');
      document.getElementById('label-signup-pseudo').textContent       = t('auth_pseudo');
      document.getElementById('btn-signup').textContent                = t('auth_btn_inscription');
      document.getElementById('login-email').placeholder               = t('auth_email_placeholder');
      document.getElementById('signup-email').placeholder              = t('auth_email_placeholder');
      document.getElementById('signup-password').placeholder           = t('auth_mot_de_passe_placeholder');
      document.getElementById('register-password-confirm').placeholder = t('auth_confirmer_mdp_placeholder');
      document.getElementById('signup-pseudo').placeholder             = t('auth_pseudo_placeholder');

      // ── Bouton langue ──
      const btnLang = document.getElementById('btn-lang');
      btnLang.textContent = lang === 'fr' ? '🇬🇧' : '🇫🇷';
      btnLang.title = lang === 'fr' ? 'Switch to English' : 'Passer en français';
      btnLang.addEventListener('click', () => setLang(lang === 'fr' ? 'en' : 'fr'));

      // ── Redirect si déjà connecté ──
      const { data: { session } } = await supabase.auth.getSession();
      if (session) window.location.href = './index.html';

      // ── Tabs ──
      const tabLogin   = document.getElementById('tab-login');
      const tabSignup  = document.getElementById('tab-signup');
      const formLogin  = document.getElementById('form-login');
      const formSignup = document.getElementById('form-signup');

      tabLogin.addEventListener('click', () => {
        tabLogin.classList.add('active');
        tabSignup.classList.remove('active');
        formLogin.style.display = 'block';
        formSignup.style.display = 'none';
        hideMessage();
      });
      tabSignup.addEventListener('click', () => {
        tabSignup.classList.add('active');
        tabLogin.classList.remove('active');
        formSignup.style.display = 'block';
        formLogin.style.display = 'none';
        hideMessage();
      });

      function showMessage(text, type) {
        const el = document.getElementById('auth-message');
        el.textContent = text;
        el.className = 'auth-message ' + type;
      }
      function hideMessage() {
        document.getElementById('auth-message').className = 'auth-message';
      }

      // ── Connexion ──
      document.getElementById('btn-login').addEventListener('click', async () => {
        const email    = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;
        if (!email || !password) return showMessage(t('auth_erreur_champs'), 'error');

        const btn = document.getElementById('btn-login');
        btn.disabled = true;
        btn.textContent = t('auth_btn_connexion_chargement');

        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) {
          showMessage(t('auth_erreur_connexion'), 'error');
          btn.disabled = false;
          btn.textContent = t('auth_btn_connexion');
        } else {
          window.location.href = './index.html';
        }
      });

      // ── Inscription ──
      document.getElementById('btn-signup').addEventListener('click', async () => {
        const email    = document.getElementById('signup-email').value.trim();
        const password = document.getElementById('signup-password').value;
        const pseudo   = document.getElementById('signup-pseudo').value.trim();
        const confirm  = document.getElementById('register-password-confirm').value;

        if (!email || !password || !pseudo) return showMessage(t('auth_erreur_champs'), 'error');
        if (password.length < 8) return showMessage(t('auth_erreur_mdp_court'), 'error');
        if (password !== confirm) {
          showMessage(t('auth_erreur_mdp_diff'), 'error');
          return;
        }

        const btn = document.getElementById('btn-signup');
        btn.disabled = true;
        btn.textContent = t('auth_btn_inscription_chargement');

        const { error } = await supabase.auth.signUp({
          email,
          password,
          options: { data: { pseudo, lang: getLang() } },
        });
        if (error) {
          showMessage(t('auth_erreur_generique') + error.message, 'error');
          btn.disabled = false;
          btn.textContent = t('auth_btn_inscription');
        } else {
          showMessage(t('auth_succes_inscription'), 'success');
        }
      });

      // ── Mot de passe oublié ──
      document.getElementById('lien-forgot').addEventListener('click', async (e) => {
        e.preventDefault();
        const email = document.getElementById('login-email').value.trim();
        if (!email) return showMessage(t('auth_email_dabord'), 'error');

        const { error } = await supabase.auth.resetPasswordForEmail(email, {
          redirectTo: window.location.origin + '/reset.html',
        });

        if (error) showMessage(t('auth_erreur_generique') + error.message, 'error');
        else showMessage(t('auth_succes_email_envoye'), 'success');
      });
    </script>
  </body>
</html>
