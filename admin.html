<!doctype html>
<html lang="fr" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>磨き Migaki — Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --gold: #d4a017;
        --gold-bright: #f0c040;
        --wood: #8b6914;
        --wood-dark: #5c4409;
        --ok: #4a8c3f;
        --danger: #8c3030;
        --radius: 6px;
      }

      [data-theme='dark'] {
        --bg: #0c0b08;
        --surface-1: #18150f;
        --surface-2: #22201a;
        --surface-3: #2c2920;
        --surface-4: #38342a;
        --text-primary: #e8dfc8;
        --text-secondary: #a09070;
        --text-muted: #5a5040;
        --border: rgba(212, 160, 23, 0.14);
        --border-strong: rgba(212, 160, 23, 0.3);
        --shadow: 0 8px 32px rgba(0, 0, 0, 0.7);
        --panel-bg: rgba(212, 160, 23, 0.04);
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Crimson Pro', Georgia, serif;
        background: var(--bg);
        color: var(--text-primary);
        min-height: 100vh;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 32px;
        border-bottom: 1px solid var(--border-strong);
        background: var(--panel-bg);
      }

      header h1 {
        font-family: 'Cinzel', serif;
        font-size: 22px;
        letter-spacing: 0.15em;
        color: var(--gold-bright);
      }

      header h1 span {
        font-size: 13px;
        letter-spacing: 0.1em;
        color: var(--text-muted);
        margin-left: 16px;
        text-transform: uppercase;
      }

      .header-btns {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .btn {
        padding: 8px 18px;
        border-radius: var(--radius);
        border: 1px solid var(--border-strong);
        background: var(--surface-2);
        color: var(--text-secondary);
        font-family: 'Cinzel', serif;
        font-size: 12px;
        letter-spacing: 0.06em;
        cursor: pointer;
        transition: all 0.22s;
      }
      .btn:hover {
        border-color: var(--gold);
        color: var(--gold-bright);
        background: var(--surface-3);
      }
      .btn-danger {
        border-color: rgba(140, 48, 48, 0.5);
        color: #b07070;
      }
      .btn-danger:hover {
        background: rgba(140, 48, 48, 0.15);
        border-color: #c06060;
        color: #e09090;
      }

      /* Style spécifique pour le bouton langue */
      #btn-lang {
        padding: 6px 10px;
        font-size: 16px;
        border-radius: 20px;
        line-height: 1;
      }

      main {
        max-width: 960px;
        margin: 0 auto;
        padding: 32px 24px;
        display: flex;
        flex-direction: column;
        gap: 40px;
      }

      .section-title {
        font-family: 'Cinzel', serif;
        font-size: 13px;
        letter-spacing: 0.14em;
        color: var(--text-muted);
        text-transform: uppercase;
        margin-bottom: 16px;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--border);
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
      }

      .stat-card {
        background: var(--surface-1);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 20px 16px;
        text-align: center;
      }

      .stat-card-icon {
        font-size: 28px;
        margin-bottom: 8px;
        display: block;
      }
      .stat-card-value {
        font-family: 'Cinzel', serif;
        font-size: 32px;
        font-weight: 600;
        color: var(--gold-bright);
        display: block;
        line-height: 1;
      }
      .stat-card-label {
        font-size: 12px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-top: 6px;
        display: block;
      }

      .upload-zone {
        background: var(--surface-1);
        border: 2px dashed var(--border-strong);
        border-radius: var(--radius);
        padding: 32px;
        text-align: center;
        margin-bottom: 16px;
        transition: border-color 0.2s;
        cursor: pointer;
        position: relative;
      }
      .upload-zone:hover {
        border-color: var(--gold);
      }
      .upload-zone input {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
        width: 100%;
        height: 100%;
      }
      .upload-zone-icon {
        font-size: 36px;
        margin-bottom: 12px;
      }
      .upload-zone-text {
        font-family: 'Cinzel', serif;
        font-size: 14px;
        letter-spacing: 0.08em;
        color: var(--text-secondary);
      }
      .upload-zone-sub {
        font-size: 13px;
        color: var(--text-muted);
        margin-top: 6px;
        font-style: italic;
      }
      .upload-zone.dragover {
        border-color: var(--gold);
        background: rgba(212, 160, 23, 0.05);
      }

      #upload-status {
        display: none;
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 12px 16px;
        font-size: 14px;
        margin-bottom: 16px;
      }
      #upload-status.success {
        border-color: rgba(74, 140, 63, 0.4);
        color: #80cc70;
        display: block;
      }
      #upload-status.error {
        border-color: rgba(140, 48, 48, 0.4);
        color: #e08080;
        display: block;
      }
      #upload-status.loading {
        display: block;
        color: var(--text-secondary);
      }

      .data-table {
        width: 100%;
        border-collapse: collapse;
        background: var(--surface-1);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
      }

      .data-table th {
        padding: 12px 16px;
        background: var(--surface-2);
        border-bottom: 1px solid var(--border);
        font-family: 'Cinzel', serif;
        font-size: 11px;
        letter-spacing: 0.13em;
        color: var(--text-muted);
        text-transform: uppercase;
        text-align: left;
      }

      .data-table td {
        padding: 12px 16px;
        border-bottom: 1px solid var(--border);
        font-size: 15px;
        vertical-align: middle;
      }

      .data-table tr:last-child td {
        border-bottom: none;
      }
      .data-table tbody tr:hover {
        background: rgba(212, 160, 23, 0.04);
      }

      .text-muted {
        color: var(--text-muted);
        font-size: 13px;
      }
      .text-primary {
        color: var(--text-primary);
      }

      .badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 10px;
        font-size: 12px;
        background: var(--surface-3);
        color: var(--text-muted);
      }
      .badge-active {
        background: rgba(74, 140, 63, 0.2);
        color: #80cc70;
      }

      .table-actions {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
      }

      .empty-state {
        padding: 32px;
        text-align: center;
        color: var(--text-muted);
        font-style: italic;
      }

      #toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%);
        padding: 12px 24px;
        border-radius: var(--radius);
        font-family: 'Cinzel', serif;
        font-size: 13px;
        letter-spacing: 0.06em;
        opacity: 0;
        transition: opacity 0.3s;
        pointer-events: none;
        z-index: 9999;
      }
      #toast.show {
        opacity: 1;
      }
      #toast.success {
        background: rgba(74, 140, 63, 0.95);
        color: #b8ffb8;
        border: 1px solid rgba(100, 200, 80, 0.4);
      }
      #toast.error {
        background: rgba(140, 48, 48, 0.95);
        color: #ffb8b8;
        border: 1px solid rgba(200, 80, 80, 0.4);
      }
    </style>
  </head>
  <body>
    <header>
      <h1>磨き &nbsp;MIGAKI <span id="lbl-admin-titre"></span></h1>
      <div class="header-btns">
        <button class="btn" id="btn-lang" title="Changer de langue"></button>
        <button class="btn" id="btn-retour"></button>
        <button class="btn" id="btn-logout"></button>
      </div>
    </header>

    <main>
      <div
        id="access-denied"
        style="display: none; text-align: center; padding: 60px; color: #e08080"
      >
        <div style="font-size: 48px; margin-bottom: 16px">🚫</div>
        <div
          style="font-family: 'Cinzel', serif; font-size: 18px"
          id="lbl-acces-refuse"
        ></div>
        <div
          style="color: var(--text-muted); margin-top: 8px"
          id="lbl-acces-refuse-desc"
        ></div>
      </div>

      <div id="admin-content" style="display: none">
        <div>
          <p class="section-title" id="lbl-vue-ensemble"></p>
          <div class="stats-grid">
            <div class="stat-card">
              <span class="stat-card-icon">👤</span>
              <span class="stat-card-value" id="stat-users">—</span>
              <span class="stat-card-label" id="lbl-stat-users"></span>
            </div>
            <div class="stat-card">
              <span class="stat-card-icon">📄</span>
              <span class="stat-card-value" id="stat-sgf-total">—</span>
              <span class="stat-card-label" id="lbl-stat-sgf-total"></span>
            </div>
            <div class="stat-card">
              <span class="stat-card-icon">🌐</span>
              <span class="stat-card-value" id="stat-sgf-shared">—</span>
              <span class="stat-card-label" id="lbl-stat-sgf-shared"></span>
            </div>
            <div class="stat-card">
              <span class="stat-card-icon">🎯</span>
              <span class="stat-card-value" id="stat-variations">—</span>
              <span class="stat-card-label" id="lbl-stat-sequences"></span>
            </div>
          </div>
        </div>

        <div>
          <p class="section-title">
            <span id="lbl-users-title"></span> (<span id="nb-users">0</span>)
          </p>
          <div id="liste-users">
            <div class="empty-state" id="lbl-users-loading"></div>
          </div>
        </div>

        <div>
          <p class="section-title">
            <span id="lbl-shared-title"></span> (<span id="nb-partages">0</span
            >)
          </p>

          <div class="upload-zone" id="upload-zone">
            <input type="file" id="sgf-admin-upload" accept=".sgf" multiple />
            <div class="upload-zone-icon">📂</div>
            <div class="upload-zone-text" id="lbl-upload-instruction"></div>
            <div class="upload-zone-sub" id="lbl-upload-desc"></div>
          </div>

          <div id="upload-status"></div>

          <div id="liste-partages">
            <div class="empty-state" id="lbl-shared-loading"></div>
          </div>
        </div>
      </div>
    </main>

    <div id="toast"></div>

    <script type="module">
      import { initI18n, t, getLang, setLang } from './i18n.js';
      import {
        supabase,
        isAdmin,
        uploaderSgfPartage,
        supprimerSgfPartage,
        listerSgf,
      } from './supabase.js';

      // ── Initialisation i18n et Traduction Statique ──
      await initI18n();
      const lang = getLang();

      const btnLang = document.getElementById('btn-lang');
      btnLang.textContent = lang === 'fr' ? '🇬🇧' : '🇫🇷';
      btnLang.title =
        lang === 'fr' ? 'Switch to English' : 'Passer en français';
      btnLang.addEventListener('click', () =>
        setLang(lang === 'fr' ? 'en' : 'fr')
      );

      document.title = t('admin_page_titre');
      document.getElementById('lbl-admin-titre').textContent = t('admin_titre');
      document.getElementById('btn-retour').textContent = t('admin_retour');
      document.getElementById('btn-logout').textContent = t('header_quitter');

      document.getElementById('lbl-acces-refuse').textContent =
        t('admin_acces_refuse');
      document.getElementById('lbl-acces-refuse-desc').textContent = t(
        'admin_acces_refuse_desc'
      );

      document.getElementById('lbl-vue-ensemble').textContent =
        t('admin_vue_ensemble');
      document.getElementById('lbl-stat-users').textContent = t(
        'admin_stats_utilisateurs'
      );
      document.getElementById('lbl-stat-sgf-total').textContent = t(
        'admin_stats_sgf_total'
      );
      document.getElementById('lbl-stat-sgf-shared').textContent = t(
        'admin_stats_sgf_partages'
      );
      document.getElementById('lbl-stat-sequences').textContent = t(
        'admin_stats_sequences'
      );

      document.getElementById('lbl-users-title').textContent =
        t('admin_users_titre');
      document.getElementById('lbl-shared-title').textContent = t(
        'admin_sgf_partages_titre'
      );

      document.getElementById('lbl-users-loading').textContent =
        t('admin_chargement');
      document.getElementById('lbl-shared-loading').textContent =
        t('admin_chargement');

      document.getElementById('lbl-upload-instruction').textContent = t(
        'admin_upload_instruction'
      );
      document.getElementById('lbl-upload-desc').textContent =
        t('admin_upload_desc');

      // ── Auth + admin check ──
      const {
        data: { session },
      } = await supabase.auth.getSession();
      if (!session) {
        window.location.href = './auth.html';
      }

      const admin = await isAdmin();
      if (!admin) {
        document.getElementById('access-denied').style.display = 'block';
      } else {
        document.getElementById('admin-content').style.display = 'block';
        chargerDonnees();
      }

      // ── Navigation ──
      document
        .getElementById('btn-retour')
        .addEventListener(
          'click',
          () => (window.location.href = './index.html')
        );
      document
        .getElementById('btn-logout')
        .addEventListener('click', async () => {
          await supabase.auth.signOut();
          window.location.href = './auth.html';
        });

      // ── Toast ──
      function toast(msg, type = 'success') {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.className = `show ${type}`;
        setTimeout(() => (el.className = ''), 2500);
      }

      // ── Chargement global ──
      async function chargerDonnees() {
        await Promise.all([
          chargerStats(),
          chargerListeUsers(),
          chargerListePartages(),
        ]);
      }

      // ── Stats globales ──
      async function chargerStats() {
        const { data: users } = await supabase.rpc('get_users_admin');
        const { data: sgfs } = await supabase
          .from('sgf_files')
          .select('id, is_shared');
        const { count: varCount } = await supabase
          .from('variation_progress')
          .select('*', { count: 'exact', head: true });

        document.getElementById('stat-users').textContent = users?.length ?? 0;
        document.getElementById('stat-sgf-total').textContent =
          sgfs?.length ?? 0;
        document.getElementById('stat-sgf-shared').textContent =
          sgfs?.filter((s) => s.is_shared).length ?? 0;
        document.getElementById('stat-variations').textContent = varCount ?? 0;
      }

      // ── Liste utilisateurs ──
      async function chargerListeUsers() {
        const { data: users, error } = await supabase.rpc('get_users_admin');
        const container = document.getElementById('liste-users');

        if (error || !users) {
          container.innerHTML = `<div class="empty-state">${t('admin_erreur_chargement')}</div>`;
          return;
        }

        document.getElementById('nb-users').textContent = users.length;

        if (users.length === 0) {
          container.innerHTML = `<div class="empty-state">${t('admin_users_vide')}</div>`;
          return;
        }

        const table = document.createElement('table');
        table.className = 'data-table';
        table.innerHTML = `
    <thead>
        <tr>
            <th>${t('admin_users_email')}</th>
            <th>${t('admin_users_inscription')}</th>
            <th style="text-align:center">${t('admin_users_sgf')}</th>
            <th style="text-align:center">${t('admin_users_sequences')}</th>
            <th style="text-align:right">${t('admin_table_actions')}</th>
        </tr>
    </thead>
    <tbody></tbody>
        `;
        const tbody = table.querySelector('tbody');

        for (const user of users) {
          const tr = document.createElement('tr');
          const date = new Date(user.created_at).toLocaleDateString(
            lang === 'fr' ? 'fr-FR' : 'en-US'
          );
          tr.innerHTML = `
    <td>
        <span class="text-primary">${user.email}</span>
        ${user.variation_count > 0 ? `<span class="badge badge-active" style="margin-left:8px;">${t('admin_users_actif')}</span>` : ''}
    </td>
    <td><span class="text-muted">${date}</span></td>
    <td style="text-align:center"><span class="badge">${user.sgf_count}</span></td>
    <td style="text-align:center">
        <span class="${user.variation_count > 0 ? 'text-primary' : 'text-muted'}">${user.variation_count}</span>
    </td>
    <td>
        <div class="table-actions">
            <button class="btn btn-danger btn-del-user"
                data-id="${user.id}" data-email="${user.email}">
                ${t('admin_users_supprimer')}
            </button>
        </div>
    </td>
`;
          tbody.appendChild(tr);
        }

        // Boutons suppression utilisateur
        tbody.querySelectorAll('.btn-del-user').forEach((btn) => {
          btn.addEventListener('click', async () => {
            const confirmMsg = t('admin_users_supprimer_confirm', {
              email: btn.dataset.email,
            });
            if (!confirm(confirmMsg)) return;

            const { error } = await supabase.rpc('delete_user', {
              target_user_id: btn.dataset.id,
            });
            if (error) {
              toast(t('auth_erreur_generique') + error.message, 'error');
              return;
            }
            toast(t('admin_toast_user_deleted'), 'success');
            chargerDonnees();
          });
        });

        container.innerHTML = '';
        container.appendChild(table);
      }

      // ── Upload SGF partagé ──
      const uploadInput = document.getElementById('sgf-admin-upload');
      const uploadZone = document.getElementById('upload-zone');
      const uploadStatus = document.getElementById('upload-status');

      uploadInput.addEventListener('change', () =>
        traiterFichiers(uploadInput.files)
      );
      uploadZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadZone.classList.add('dragover');
      });
      uploadZone.addEventListener('dragleave', () =>
        uploadZone.classList.remove('dragover')
      );
      uploadZone.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadZone.classList.remove('dragover');
        traiterFichiers(e.dataTransfer.files);
      });

      async function traiterFichiers(files) {
        if (!files.length) return;
        uploadStatus.className = 'loading';
        uploadStatus.textContent = t('admin_upload_en_cours', {
          current: 0,
          total: files.length,
        });

        let ok = 0,
          err = 0;
        for (let i = 0; i < files.length; i++) {
          const file = files[i];
          uploadStatus.textContent =
            t('admin_upload_en_cours', {
              current: i + 1,
              total: files.length,
            }) + ` — ${file.name}`;
          const id = await uploaderSgfPartage(file);
          if (id) ok++;
          else err++;
        }

        if (err === 0) {
          uploadStatus.className = 'success';
          uploadStatus.textContent = t('admin_upload_succes', { count: ok });
          toast(t('admin_toast_sgf_partages', { count: ok }), 'success');
        } else {
          uploadStatus.className = 'error';
          uploadStatus.textContent = t('admin_upload_bilan', { ok, err });
        }

        uploadInput.value = '';
        chargerListePartages();
        chargerStats();
      }

      // ── Liste SGF partagés ──
      async function chargerListePartages() {
        const tous = await listerSgf();
        const partages = tous.filter((s) => s.is_shared);
        const container = document.getElementById('liste-partages');

        document.getElementById('nb-partages').textContent = partages.length;

        if (partages.length === 0) {
          container.innerHTML = `<div class="empty-state">${t('admin_sgf_vide')}</div>`;
          return;
        }

        const table = document.createElement('table');
        table.className = 'data-table';
        table.innerHTML = `
            <thead>
                <tr>
                    <th>${t('variations_nom')}</th>
                    <th>${t('admin_sgf_ajoute_le')}</th>
                    <th style="text-align:right">${t('admin_table_actions')}</th>
                </tr>
            </thead>
            <tbody></tbody>
        `;
        const tbody = table.querySelector('tbody');

        for (const sgf of partages) {
          const tr = document.createElement('tr');
          const date = new Date(sgf.created_at).toLocaleDateString(
            lang === 'fr' ? 'fr-FR' : 'en-US'
          );
          tr.innerHTML = `
                <td><span class="text-primary">${sgf.name.replace('.sgf', '')}</span></td>
                <td><span class="text-muted">${date}</span></td>
                <td>
                    <div class="table-actions">
                        <button class="btn btn-danger btn-del"
                            data-id="${sgf.id}" data-path="${sgf.storage_path}" data-name="${sgf.name}">
                            ${t('admin_sgf_supprimer')}
                        </button>
                    </div>
                </td>
            `;
          tbody.appendChild(tr);
        }

        container.innerHTML = '';
        container.appendChild(table);

        container.querySelectorAll('.btn-del').forEach((btn) => {
          btn.addEventListener('click', async () => {
            const confirmMsg = t('admin_sgf_supprimer_confirm', {
              nom: btn.dataset.name,
            });
            if (!confirm(confirmMsg)) return;

            await supprimerSgfPartage(btn.dataset.id, btn.dataset.path);
            toast(t('admin_toast_sgf_deleted'), 'success');
            chargerListePartages();
            chargerStats();
          });
        });
      }
    </script>
  </body>
</html>
