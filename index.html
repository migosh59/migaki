<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dojo Fuseki</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
    <style>
        /* =============================================
           THÈMES
        ============================================= */
        :root {
            --gold:        #d4a017;
            --gold-bright: #f0c040;
            --wood:        #8b6914;
            --wood-dark:   #5c4409;
            --wood-light:  #c4952a;
            --board:       #dcb35c;
            --ok:    #4a8c3f;
            --warn:  #b87333;
            --danger:#8c3030;
            --info:  #2c6080;
            --radius: 6px;
        }

        [data-theme="dark"] {
            --bg:            #0c0b08;
            --surface-1:     #18150f;
            --surface-2:     #22201a;
            --surface-3:     #2c2920;
            --surface-4:     #38342a;
            --text-primary:  #e8dfc8;
            --text-secondary:#a09070;
            --text-muted:    #5a5040;
            --border:        rgba(212,160,23,0.14);
            --border-strong: rgba(212,160,23,0.30);
            --shadow:        0 8px 32px rgba(0,0,0,0.7);
            --panel-bg:      rgba(212,160,23,0.04);
            --row-hover:     rgba(212,160,23,0.04);
            --row-active:    rgba(212,160,23,0.08);
            --input-focus:   rgba(255,255,255,0.04);
            --scan-opacity:  0.008;
            --goban-ring1:   #8b6914;
            --goban-ring2:   #4a3606;
            --goban-glow:    rgba(0,0,0,0.8);
        }

        [data-theme="light"] {
            --bg:            #f0ebe0;
            --surface-1:     #faf6ee;
            --surface-2:     #fff8ed;
            --surface-3:     #ede4d0;
            --surface-4:     #d8cebc;
            --text-primary:  #2a220e;
            --text-secondary:#6b5530;
            --text-muted:    #9e8660;
            --border:        rgba(139,105,20,0.18);
            --border-strong: rgba(139,105,20,0.38);
            --shadow:        0 4px 20px rgba(100,70,10,0.12);
            --panel-bg:      rgba(212,160,23,0.06);
            --row-hover:     rgba(139,105,20,0.05);
            --row-active:    rgba(139,105,20,0.10);
            --input-focus:   rgba(0,0,0,0.04);
            --scan-opacity:  0;
            --goban-ring1:   #8b6914;
            --goban-ring2:   #a07820;
            --goban-glow:    rgba(100,70,10,0.3);
        }

        /* =============================================
           RESET & BASE
        ============================================= */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { height: 100%; }

        body {
            font-family: 'Crimson Pro', Georgia, serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background 0.35s, color 0.35s;
        }

        body::before {
            content: '';
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse at 15% 40%, rgba(139,105,20,0.07) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 15%, rgba(92,68,9,0.05) 0%, transparent 50%),
                repeating-linear-gradient(0deg, transparent, transparent 3px,
                    rgba(255,255,255,var(--scan-opacity)) 3px,
                    rgba(255,255,255,var(--scan-opacity)) 4px);
            pointer-events: none; z-index: 0;
        }

        /* =============================================
           HEADER
        ============================================= */
        #app-header {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px 20px 14px;
            border-bottom: 1px solid var(--border-strong);
            background: var(--panel-bg);
            z-index: 10;
        }

        .header-titles { text-align: center; }

        #app-header h1 {
            font-family: 'Cinzel', serif;
            font-size: clamp(22px, 3.5vw, 40px);
            font-weight: 600;
            letter-spacing: 0.18em;
            color: var(--gold-bright);
            text-shadow: 0 0 30px rgba(212,160,23,0.4), 0 2px 4px rgba(0,0,0,0.5);
            line-height: 1;
        }

        .subtitle {
            font-style: italic;
            font-size: 15px;
            color: var(--text-muted);
            letter-spacing: 0.1em;
            margin-top: 4px;
        }

        #app-header::after {
            content: '';
            position: absolute; bottom: -1px; left: 50%;
            transform: translateX(-50%);
            width: 80px; height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        #btn-theme {
            position: absolute; right: 18px; top: 50%;
            transform: translateY(-50%);
            background: var(--surface-2);
            border: 1px solid var(--border-strong);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.22s;
            color: var(--text-secondary);
            line-height: 1;
        }

        #btn-theme:hover { border-color: var(--gold); background: var(--surface-3); }

        /* =============================================
           LAYOUT — RESPONSIVE GRID
           ≥900px  : goban | sidebar fixe
           <900px  : goban puis dashboard dessous
        ============================================= */
        #layout-principal {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 0;
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            min-height: calc(100vh - 70px);
        }

        /* =============================================
           COLONNE GAUCHE
        ============================================= */
        #colonne-gauche {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 12px 18px;
            min-width: 0;
        }

        /* Menu fichier */
        #menu-fichier {
            background: var(--surface-2);
            border: 1px solid var(--border-strong);
            border-radius: var(--radius);
            padding: 22px 30px;
            text-align: center;
            box-shadow: var(--shadow);
            width: 100%; max-width: 420px;
        }

        #menu-fichier p {
            font-family: 'Cinzel', serif;
            font-size: 13px; letter-spacing: 0.12em;
            color: var(--text-muted);
            margin-bottom: 14px; text-transform: uppercase;
        }

        .file-input-wrapper { position: relative; display: inline-block; }

        #sgf-file {
            position: absolute; opacity: 0;
            width: 100%; height: 100%;
            cursor: pointer; z-index: 2;
        }

        .file-btn {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 11px 26px;
            background: linear-gradient(135deg, var(--wood-dark), var(--wood));
            border: 1px solid var(--gold);
            border-radius: var(--radius);
            color: var(--gold-bright);
            font-family: 'Cinzel', serif;
            font-size: 15px; letter-spacing: 0.08em;
            cursor: pointer; transition: all 0.25s;
            box-shadow: 0 2px 14px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .file-btn:hover {
            background: linear-gradient(135deg, var(--wood), var(--wood-light));
            box-shadow: 0 4px 20px rgba(212,160,23,0.25);
            transform: translateY(-1px);
        }

        #file-name-display {
            margin-top: 10px; font-size: 13px;
            color: var(--text-muted); font-style: italic;
        }

        /* Barre de contrôles */
        #actions-exercice { display: none; width: 100%; max-width: 620px; }

        #barre-controles {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 10px 14px;
            display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
            box-shadow: var(--shadow);
        }

        #camp-label {
            font-family: 'Cinzel', serif;
            font-size: 12px; letter-spacing: 0.1em;
            color: var(--text-muted); text-transform: uppercase;
        }

        /* ---- Custom select couleur joueur ---- */
        .custom-select {
            position: relative;
            user-select: none;
            cursor: pointer;
        }

        .custom-select-trigger {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 7px 12px;
            background: var(--surface-3);
            border: 1px solid var(--border-strong);
            border-radius: var(--radius);
            font-family: 'Crimson Pro', serif;
            font-size: 17px; color: var(--text-primary);
            transition: border-color 0.2s;
            min-width: 110px;
        }

        .custom-select.open .custom-select-trigger { border-color: var(--gold); }

        .select-arrow {
            font-size: 11px; color: var(--text-muted);
            margin-left: auto;
            transition: transform 0.2s;
        }

        .custom-select.open .select-arrow { transform: rotate(180deg); }

        .custom-select-dropdown {
            display: none;
            position: absolute; top: calc(100% + 4px); left: 0;
            min-width: 100%;
            background: var(--surface-2);
            border: 1px solid var(--border-strong);
            border-radius: var(--radius);
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            z-index: 100; overflow: hidden;
        }

        .custom-select.open .custom-select-dropdown { display: block; }

        .custom-option {
            display: flex; align-items: center; gap: 8px;
            padding: 9px 14px;
            font-family: 'Crimson Pro', serif;
            font-size: 17px; color: var(--text-primary);
            transition: background 0.15s;
            cursor: pointer; white-space: nowrap;
        }

        .custom-option:hover { background: var(--row-hover); }
        .custom-option.selected { color: var(--gold-bright); }

        /* Pierres CSS — indépendantes du thème système */
        .stone-icon {
            display: inline-block;
            width: 16px; height: 16px;
            border-radius: 50%; flex-shrink: 0;
        }

        .stone-noir {
            background: radial-gradient(circle at 35% 35%, #555, #000);
            box-shadow: inset -1px -1px 3px rgba(255,255,255,0.15), 0 1px 3px rgba(0,0,0,0.6);
        }

        .stone-blanc {
            background: radial-gradient(circle at 35% 35%, #fff, #ccc);
            box-shadow: inset -1px -1px 3px rgba(0,0,0,0.2), 0 1px 3px rgba(0,0,0,0.4);
        }

        /* Vies */
        #compteur-vies { display: flex; gap: 7px; align-items: center; margin-left: auto; }

        .vie {
            width: 17px; height: 17px; border-radius: 50%;
            background: var(--danger);
            box-shadow: 0 0 8px rgba(140,48,48,0.6);
            transition: all 0.3s;
        }

        .vie.perdue { background: var(--surface-4); box-shadow: none; }
        .vie.flash  { animation: vieFlash 0.4s ease; }

        @keyframes vieFlash {
            0%,100% { transform:scale(1); }
            50% { transform:scale(1.55); background:#ff5555; box-shadow:0 0 18px rgba(255,80,80,0.9); }
        }

        /* Bouton abandonner */
        #btn-solution {
            padding: 8px 16px; background: transparent;
            border: 1px solid rgba(140,48,48,0.45);
            border-radius: var(--radius);
            color: #b07070;
            font-family: 'Crimson Pro', serif;
            font-size: 16px; cursor: pointer; transition: all 0.22s;
        }

        #btn-solution:hover { background: rgba(140,48,48,0.15); border-color: #c06060; color: #e09090; }

        #btn-son {
            padding: 7px 11px; background: transparent;
            border: 1px solid var(--border-strong);
            border-radius: var(--radius);
            font-size: 16px; cursor: pointer; transition: all 0.22s;
            line-height: 1;
        }
        #btn-son:hover { background: var(--surface-3); }
        #btn-son.mute { opacity: 0.4; }

        /* Info variation */
        #info-variation { display: none; width: 100%; max-width: 620px; text-align: center; }

        #info-nom {
            font-family: 'Cinzel', serif;
            font-size: 18px; color: var(--gold-bright);
            letter-spacing: 0.07em;
            text-shadow: 0 0 20px rgba(212,160,23,0.3);
        }

        #info-comment {
            font-style: italic; color: var(--text-secondary);
            font-size: 16px; margin-top: 4px; line-height: 1.5;
        }

        /* Commentaire SGF */
        #commentaire-sgf {
            display: none;
            background: var(--surface-1);
            border: 1px solid var(--border);
            border-left: 3px solid var(--gold);
            border-radius: var(--radius);
            padding: 12px 16px;
            font-style: italic;
            color: var(--text-secondary);
            font-size: 15px;
            line-height: 1.6;
            box-shadow: var(--shadow);
            animation: fadeSlide 0.35s ease;
        }

        @keyframes fadeSlide {
            from { opacity:0; transform:translateY(4px); }
            to   { opacity:1; transform:translateY(0); }
        }

        /* Goban */
        #goban-wrapper {
            position: relative;
            width: 100%; max-width: 620px;
            display: flex; justify-content: center;
        }

        #toast-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex; flex-direction: column; gap: 7px;
            pointer-events: none;
        }

        #goban {
            background-color: var(--board);
            box-shadow:
                0 0 0 3px var(--goban-ring1),
                0 0 0 5px var(--goban-ring2),
                0 12px 48px var(--goban-glow),
                0 0 60px rgba(139,105,20,0.12);
            border-radius: 2px; display: block;
        }

        #goban-wrapper.ordi-pense::after {
            content: '';
            position: absolute; inset: -7px;
            border-radius: 4px;
            border: 2px solid var(--gold);
            opacity: 0;
            animation: ordiPulse 1.2s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes ordiPulse {
            0%,100% { opacity:0; }
            50% { opacity:0.35; }
        }

        /* Message de fin */
        #message-fin {
            display: none; width: 100%; max-width: 620px;
            border-radius: var(--radius); overflow: hidden;
            animation: slideUp 0.4s cubic-bezier(0.22,1,0.36,1);
        }

        @keyframes slideUp {
            from { opacity:0; transform:translateY(12px); }
            to   { opacity:1; transform:translateY(0); }
        }

        .fin-inner { padding: 16px 20px; display: flex; align-items: center; gap: 16px; }
        .fin-icone { font-size: 34px; flex-shrink: 0; }
        .fin-texte h2 { font-family:'Cinzel',serif; font-size:18px; letter-spacing:0.05em; }
        .fin-texte p  { font-size:15px; opacity:0.75; margin-top:2px; }

        #btn-suivante {
            margin-left: auto; flex-shrink: 0;
            padding: 10px 20px;
            border-radius: var(--radius); border: none;
            font-family: 'Cinzel', serif;
            font-size: 14px; letter-spacing: 0.06em;
            cursor: pointer; transition: all 0.22s;
        }

        #btn-suivante:hover { filter: brightness(1.12); transform: translateY(-1px); }

        .fin-parfaite { background:linear-gradient(135deg,rgba(74,140,63,.22),rgba(74,140,63,.08)); border:1px solid rgba(74,140,63,.42); }
        .fin-parfaite h2 { color:#80cc70; }
        .fin-parfaite #btn-suivante { background:var(--ok); color:white; }

        .fin-erreurs { background:linear-gradient(135deg,rgba(184,115,51,.22),rgba(184,115,51,.08)); border:1px solid rgba(184,115,51,.42); }
        .fin-erreurs h2 { color:#e8a060; }
        .fin-erreurs #btn-suivante { background:var(--warn); color:white; }

        .fin-echec { background:linear-gradient(135deg,rgba(140,48,48,.22),rgba(140,48,48,.08)); border:1px solid rgba(140,48,48,.42); }
        .fin-echec h2 { color:#e08080; }
        .fin-echec #btn-suivante { background:var(--danger); color:white; }

        .fin-visu { background:linear-gradient(135deg,rgba(44,96,128,.22),rgba(44,96,128,.08)); border:1px solid rgba(44,96,128,.42); }
        .fin-visu h2 { color:#70a8cc; }
        .fin-visu #btn-suivante { background:var(--info); color:white; }

        /* =============================================
           COLONNE DROITE — DASHBOARD
        ============================================= */
        #colonne-droite {
            display: none; /* affiché par JS après chargement SGF */
            flex-direction: column;
            gap: 14px;
            padding: 18px 18px 18px 0;
            min-width: 0;
            position: sticky; top: 0;
            max-height: calc(100vh - 70px);
            overflow-y: auto;
        }

        #colonne-droite::-webkit-scrollbar { width: 4px; }
        #colonne-droite::-webkit-scrollbar-thumb { background: var(--surface-4); border-radius: 2px; }

        .panel {
            background: var(--surface-1);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: background 0.35s, border-color 0.35s;
        }

        .panel-header {
            padding: 10px 15px;
            border-bottom: 1px solid var(--border);
            background: var(--panel-bg);
            display: flex; align-items: center; justify-content: space-between;
        }

        .panel-title {
            font-family: 'Cinzel', serif;
            font-size: 12px; letter-spacing: 0.14em;
            color: var(--text-muted); text-transform: uppercase;
        }

        #boutons-action { display: flex; gap: 10px; }

        .btn-action {
            flex: 1; padding: 12px 14px;
            border-radius: var(--radius); border: 1px solid;
            font-family: 'Cinzel', serif;
            font-size: 13px; letter-spacing: 0.07em;
            cursor: pointer; transition: all 0.22s;
            display: flex; align-items: center; justify-content: center; gap: 6px;
        }

        #btn-mode-presentation {
            border-color: rgba(184,115,51,0.42);
            background: rgba(184,115,51,0.07);
            color: #d0904a;
        }
        #btn-mode-presentation:hover { background:rgba(184,115,51,0.2); border-color:var(--warn); transform:translateY(-1px); }

        #btn-reset {
            border-color: rgba(110,70,160,0.35);
            background: rgba(110,70,160,0.06);
            color: #9878c0;
        }
        #btn-reset:hover { background:rgba(110,70,160,0.17); border-color:rgba(110,70,160,0.65); transform:translateY(-1px); }

        /* Stats */
        #bloc-statistiques { padding: 14px; }

        #barre-progression-globale {
            height: 5px; background: var(--surface-4);
            border-radius: 3px; overflow: hidden;
            margin-bottom: 12px; display: flex;
        }

        .prog-segment { height:100%; transition:width 0.7s cubic-bezier(0.22,1,0.36,1); }
        .prog-vert   { background: var(--ok); }
        .prog-orange { background: var(--warn); }
        .prog-rouge  { background: var(--danger); }

        #stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:7px; }

        .stat-card {
            background: var(--surface-2);
            border-radius: var(--radius);
            padding: 9px 5px; text-align: center;
            border: 1px solid transparent;
            transition: border-color 0.2s, transform 0.2s, background 0.35s;
        }
        .stat-card:hover { border-color: var(--border-strong); transform: translateY(-1px); }

        .stat-emoji { font-size:18px; display:block; margin-bottom:4px; }
        .stat-pct   { font-family:'Cinzel',serif; font-size:20px; font-weight:600; display:block; }
        .stat-label { font-size:11px; color:var(--text-muted); letter-spacing:0.04em; display:block; margin-top:3px; text-transform:uppercase; }

        .s-vert   .stat-pct { color:#80cc70; }
        .s-orange .stat-pct { color:#e8a060; }
        .s-rouge  .stat-pct { color:#e08080; }
        .s-gris   .stat-pct { color:var(--text-muted); }

        /* Tableau */
        #panel-variations { display:flex; flex-direction:column; }

        .table-container { overflow-y:auto; max-height:340px; }
        .table-container::-webkit-scrollbar { width:4px; }
        .table-container::-webkit-scrollbar-thumb { background:var(--surface-4); border-radius:2px; }

        table { width:100%; border-collapse:collapse; }
        thead { position:sticky; top:0; z-index:2; }

        th {
            padding: 10px 14px;
            background: var(--surface-2);
            border-bottom: 1px solid var(--border);
            font-family: 'Cinzel', serif;
            font-size: 11px; letter-spacing: 0.13em;
            color:var(--text-muted); text-transform:uppercase; font-weight:400; text-align:left;
            transition: background 0.35s;
        }

        tbody tr { border-bottom:1px solid var(--border); transition:background 0.12s; }
        tbody tr:hover { background:var(--row-hover); }
        tbody tr.active-row { background:var(--row-active) !important; box-shadow:inset 3px 0 0 var(--gold); }

        td { padding:8px 14px; vertical-align:middle; }
        .td-statut { text-align:center; font-size:16px; width:36px; }

        input.nom-edit, input.comment-edit {
            width:100%; background:transparent;
            color:var(--text-primary);
            border:1px solid transparent;
            padding:4px 7px; border-radius:4px;
            font-family:'Crimson Pro',serif;
            font-size:15px; transition:all 0.18s;
        }
        input.nom-edit { color:var(--text-primary); }
        input.nom-edit:focus {
            outline:none; background:var(--input-focus); border-color:var(--border-strong);
        }

        .td-visu { width:36px; text-align:center; }
        .btn-visu {
            background:none; border:1px solid transparent;
            cursor:pointer; font-size:15px;
            padding:3px 6px; border-radius:4px;
            color:var(--text-muted); transition:all 0.18s; opacity:0.4;
        }
        tbody tr:hover .btn-visu { opacity:1; }
        .btn-visu:hover { background:rgba(44,96,128,0.2); border-color:rgba(44,96,128,0.45); color:#70a8cc; opacity:1; }

        /* =============================================
           MODE PRÉSENTATION
        ============================================= */
        body.mode-presentation { background: #050403 !important; }

        body.mode-presentation #app-header,
        body.mode-presentation #colonne-droite { display: none !important; }

        body.mode-presentation #layout-principal {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 16px; max-width: none; min-height: 100vh;
        }

        body.mode-presentation #barre-controles,
        body.mode-presentation #message-fin,
        body.mode-presentation #actions-exercice { display: none !important; }

        body.mode-presentation #info-variation { display:block !important; }
        body.mode-presentation #info-nom { font-size:20px; }
        body.mode-presentation #goban-wrapper { max-width:none; }

        #btn-quitter-presentation {
            display:none; position:fixed; bottom:22px; right:22px;
            padding:9px 16px;
            background:rgba(10,8,5,0.9);
            border:1px solid var(--border-strong);
            border-radius:var(--radius);
            color:var(--text-secondary);
            font-family:'Cinzel',serif;
            font-size:11px; letter-spacing:0.08em;
            cursor:pointer; transition:all 0.22s;
            z-index:1000; backdrop-filter:blur(10px);
        }
        #btn-quitter-presentation:hover { border-color:var(--gold); color:var(--gold-bright); }
        body.mode-presentation #btn-quitter-presentation { display:block; }

        /* =============================================
           RESPONSIVE
        ============================================= */
        @media (max-width: 900px) {
            #layout-principal {
                grid-template-columns: 1fr;
                min-height: unset;
            }
            #colonne-gauche { padding: 14px 14px 0; }
            #colonne-droite {
                position: static; max-height: none; overflow-y: visible;
                padding: 14px; grid-row: 2;
            }
            .table-container { max-height: 260px; }
        }

        @media (max-width: 600px) {
            #app-header h1 { font-size: 20px; }
            .subtitle { display: none; }
            #btn-theme { padding: 5px 9px; font-size: 14px; }
            #colonne-gauche { gap: 10px; padding: 10px 10px 0; }
            #barre-controles { gap: 8px; padding: 9px 12px; }
            #camp-label { display: none; }
            .fin-inner { flex-wrap: wrap; }
            #btn-suivante { width:100%; margin-left:0; margin-top:8px; }
            #boutons-action { flex-direction: column; }
            #stats-grid { grid-template-columns: repeat(2, 1fr); }
            .table-container { max-height: 220px; }
        }

        /* =============================================
           TOASTS
        ============================================= */
        /* toasts positionnés dans #goban-wrapper */

        .toast {
            padding:10px 20px; border-radius:var(--radius);
            font-family:'Cinzel',serif; font-size:14px; letter-spacing:0.07em;
            backdrop-filter:blur(14px);
            animation:toastIn 0.3s cubic-bezier(0.22,1,0.36,1) forwards;
            white-space:nowrap;
        }
        .toast.out { animation:toastOut 0.28s ease forwards; }
        .toast-erreur  { background:rgba(140,48,48,0.9);  border:1px solid rgba(200,80,80,0.45);  color:#ffb8b8; }
        .toast-warn    { background:rgba(184,115,51,0.9); border:1px solid rgba(220,150,60,0.45); color:#ffd0a0; }
        .toast-correct { background:rgba(74,140,63,0.9);  border:1px solid rgba(100,200,80,0.45); color:#b8ffb8; }

        @keyframes toastIn  { from{opacity:0;transform:translateY(-14px) scale(0.95);} to{opacity:1;transform:translateY(0) scale(1);} }
        @keyframes toastOut { from{opacity:1;} to{opacity:0;transform:translateY(-8px);} }

        .shake { animation: shake 0.35s cubic-bezier(0.36,0.07,0.19,0.97); }
        @keyframes shake {
            10%,90% { transform:translateX(-2px); }
            20%,80% { transform:translateX(4px); }
            30%,50%,70% { transform:translateX(-4px); }
            40%,60% { transform:translateX(4px); }
        }

        ::selection { background: rgba(212,160,23,0.28); }
    </style>

    <script type="text/javascript" src="wgo.min.js"></script>
    <script type="text/javascript" src="wgo.player.min.js"></script>
</head>
<body>

    <header id="app-header">
        <div class="header-titles">
            <h1>道場 &nbsp;FUSEKI</h1>
            <div class="subtitle">Entraînement aux ouvertures</div>
        </div>
        <button id="btn-theme" title="Changer de thème">☀️</button>
    </header>

    <div id="layout-principal">

        <div id="colonne-gauche">

            <div id="menu-fichier">
                <p>Charger un fichier SGF</p>
                <div class="file-input-wrapper">
                    <input type="file" id="sgf-file" accept=".sgf">
                    <div class="file-btn">⊕ &nbsp;Ouvrir un SGF</div>
                </div>
                <div id="file-name-display">Aucun fichier sélectionné</div>
            </div>

            <div id="actions-exercice">
                <div id="barre-controles">
                    <span id="camp-label">Joueur</span>

                    <!-- Custom select : pierres CSS, indépendantes du thème système -->
                    <div id="select-couleur-joueur" class="custom-select" data-value="1">
                        <div class="custom-select-trigger">
                            <span class="stone-icon stone-noir"></span>
                            <span class="stone-label">Noir</span>
                            <span class="select-arrow">▾</span>
                        </div>
                        <div class="custom-select-dropdown">
                            <div class="custom-option selected" data-value="1">
                                <span class="stone-icon stone-noir"></span> Noir
                            </div>
                            <div class="custom-option" data-value="-1">
                                <span class="stone-icon stone-blanc"></span> Blanc
                            </div>
                        </div>
                    </div>

                    <div id="compteur-vies">
                        <div class="vie" id="vie-1"></div>
                        <div class="vie" id="vie-2"></div>
                        <div class="vie" id="vie-3"></div>
                    </div>
                    <button id="btn-son" title="Activer/désactiver le son">🔊</button>
                    <button id="btn-solution">Abandonner</button>
                </div>
            </div>

            <div id="info-variation">
                <div id="info-nom">Séquence en cours...</div>
                <div id="info-comment">Joue pour découvrir la suite !</div>
            </div>

            <div id="goban-wrapper" style="display:none;">
                <div id="toast-container"></div>
                <div id="goban"></div>
            </div>

            <div id="message-fin">
                <div class="fin-inner">
                    <div class="fin-icone" id="fin-icone"></div>
                    <div class="fin-texte">
                        <h2 id="titre-fin">—</h2>
                        <p id="sous-titre-fin"></p>
                    </div>
                    <button id="btn-suivante">Suivant →</button>
                </div>
            </div>

        </div>

        <div id="colonne-droite">

            <div id="boutons-action">
                <button id="btn-mode-presentation" class="btn-action">▶ &nbsp;Présentation</button>
                <button id="btn-reset" class="btn-action">↺ &nbsp;Réinitialiser</button>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <span class="panel-title">Progression globale</span>
                </div>
                <div id="bloc-statistiques">
                    <div id="barre-progression-globale">
                        <div class="prog-segment prog-vert"   id="prog-vert"   style="width:0%"></div>
                        <div class="prog-segment prog-orange" id="prog-orange" style="width:0%"></div>
                        <div class="prog-segment prog-rouge"  id="prog-rouge"  style="width:0%"></div>
                    </div>
                    <div id="stats-grid">
                        <div class="stat-card s-gris">
                            <span class="stat-emoji">⚪</span>
                            <span class="stat-pct" id="stat-gris">0%</span>
                            <span class="stat-label">Non exploré</span>
                        </div>
                        <div class="stat-card s-rouge">
                            <span class="stat-emoji">🔴</span>
                            <span class="stat-pct" id="stat-rouge">0%</span>
                            <span class="stat-label">Échec</span>
                        </div>
                        <div class="stat-card s-orange">
                            <span class="stat-emoji">🟠</span>
                            <span class="stat-pct" id="stat-orange">0%</span>
                            <span class="stat-label">Erreurs</span>
                        </div>
                        <div class="stat-card s-vert">
                            <span class="stat-emoji">🟢</span>
                            <span class="stat-pct" id="stat-vert">0%</span>
                            <span class="stat-label">Parfait</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="panel" id="panel-variations">
                <div class="panel-header">
                    <span class="panel-title">Variations</span>
                    <span id="nb-variations" style="font-size:11px; color:var(--text-muted);"></span>
                </div>
                <div class="table-container">
                    <table id="table-variations">
                        <thead>
                            <tr>
                                <th style="width:34px;text-align:center;">État</th>
                                <th>Nom</th>
                                <th style="width:36px;text-align:center;">Voir</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <div id="commentaire-sgf"></div>

        </div>
    </div>

    <button id="btn-quitter-presentation">✕ Quitter</button>

    <script src="app.js"></script>
</body>
</html>
