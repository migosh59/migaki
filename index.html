<!doctype html>
<html lang="fr" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>磨き Migaki</title>
    <meta
      name="description"
      content="Migaki est un outil d'entraînement gratuit au jeu de Go (Baduk / Weiqi) basé sur la répétition espacée. Uploadez vos fichiers SGF et maîtrisez vos ouvertures, Joseki et Fuseki."
    />
    <meta
      name="keywords"
      content="jeu de Go, Baduk, Weiqi, SGF, répétition espacée, entraînement, Joseki, Fuseki, apprentissage"
    />
    <meta name="author" content="Mickaël" />

    <meta
      property="og:title"
      content="磨き Migaki — Entraînement au jeu de Go"
    />
    <meta
      property="og:description"
      content="Améliorez vos ouvertures au jeu de Go grâce à la répétition espacée sur vos propres fichiers SGF."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://migaki.fr/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap"
      rel="stylesheet"
    />
    <style>
      /* =============================================
           THÈMES
        ============================================= */
      :root {
        --gold: #d4a017;
        --gold-bright: #f0c040;
        --wood: #8b6914;
        --wood-dark: #5c4409;
        --wood-light: #c4952a;
        --board: #dcb35c;
        --ok: #4a8c3f;
        --warn: #b87333;
        --danger: #8c3030;
        --info: #2c6080;
        --radius: 6px;
      }

      [data-theme='dark'] {
        --bg: #0c0b08;
        --surface-1: #18150f;
        --surface-2: #22201a;
        --surface-3: #2c2920;
        --surface-4: #38342a;
        --text-primary: #e8dfc8;
        --text-secondary: #a09070;
        --text-muted: #5a5040;
        --border: rgba(212, 160, 23, 0.14);
        --border-strong: rgba(212, 160, 23, 0.3);
        --shadow: 0 8px 32px rgba(0, 0, 0, 0.7);
        --panel-bg: rgba(212, 160, 23, 0.04);
        --row-hover: rgba(212, 160, 23, 0.04);
        --row-active: rgba(212, 160, 23, 0.08);
        --input-focus: rgba(255, 255, 255, 0.04);
        --scan-opacity: 0.008;
        --goban-ring1: #8b6914;
        --goban-ring2: #4a3606;
        --goban-glow: rgba(0, 0, 0, 0.8);
      }

      [data-theme='light'] {
        --bg: #f0ebe0;
        --surface-1: #faf6ee;
        --surface-2: #fff8ed;
        --surface-3: #ede4d0;
        --surface-4: #d8cebc;
        --text-primary: #2a220e;
        --text-secondary: #6b5530;
        --text-muted: #9e8660;
        --border: rgba(139, 105, 20, 0.18);
        --border-strong: rgba(139, 105, 20, 0.38);
        --shadow: 0 4px 20px rgba(100, 70, 10, 0.12);
        --panel-bg: rgba(212, 160, 23, 0.06);
        --row-hover: rgba(139, 105, 20, 0.05);
        --row-active: rgba(139, 105, 20, 0.1);
        --input-focus: rgba(0, 0, 0, 0.04);
        --scan-opacity: 0;
        --goban-ring1: #8b6914;
        --goban-ring2: #a07820;
        --goban-glow: rgba(100, 70, 10, 0.3);
      }

      /* =============================================
           RESET & BASE
        ============================================= */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        height: 100%;
      }

      body {
        font-family: 'Crimson Pro', Georgia, serif;
        background: var(--bg);
        color: var(--text-primary);
        min-height: 100vh;
        transition:
          background 0.35s,
          color 0.35s;
      }

      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background:
          radial-gradient(
            ellipse at 15% 40%,
            rgba(139, 105, 20, 0.07) 0%,
            transparent 55%
          ),
          radial-gradient(
            ellipse at 85% 15%,
            rgba(92, 68, 9, 0.05) 0%,
            transparent 50%
          ),
          repeating-linear-gradient(
            0deg,
            transparent,
            transparent 3px,
            rgba(255, 255, 255, var(--scan-opacity)) 3px,
            rgba(255, 255, 255, var(--scan-opacity)) 4px
          );
        pointer-events: none;
        z-index: 0;
      }

      /* =============================================
           HEADER
        ============================================= */
      #app-header {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 18px 20px 14px;
        border-bottom: 1px solid var(--border-strong);
        background: var(--panel-bg);
        z-index: 10;
      }

      #sync-indicator {
        position: fixed;
        bottom: 18px;
        left: 18px;
        font-size: 12px;
        font-family: 'Cinzel', serif;
        letter-spacing: 0.05em;
        padding: 6px 12px;
        border-radius: 20px;
        opacity: 0;
        transition: opacity 0.3s;
        pointer-events: none;
        z-index: 9999;
      }
      #sync-indicator.saving {
        opacity: 1;
        background: rgba(44, 96, 128, 0.9);
        border: 1px solid rgba(70, 140, 180, 0.4);
        color: #90c8e8;
      }
      #sync-indicator.saved {
        opacity: 1;
        background: rgba(74, 140, 63, 0.9);
        border: 1px solid rgba(100, 200, 80, 0.4);
        color: #b8ffb8;
      }

      .header-titles {
        text-align: center;
      }

      #app-header h1 {
        font-family: 'Cinzel', serif;
        font-size: clamp(22px, 3.5vw, 40px);
        font-weight: 600;
        letter-spacing: 0.18em;
        color: var(--gold-bright);
        text-shadow:
          0 0 30px rgba(212, 160, 23, 0.4),
          0 2px 4px rgba(0, 0, 0, 0.5);
        line-height: 1;
      }

      .subtitle {
        font-style: italic;
        font-size: 15px;
        color: var(--text-muted);
        letter-spacing: 0.1em;
        margin-top: 4px;
        opacity: 0;
        animation: fadeRise 1.5s ease-out 0.5s forwards;
      }

      @keyframes fadeRise {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      #app-header::after {
        content: '';
        position: absolute;
        bottom: -1px;
        left: 50%;
        transform: translateX(-50%);
        width: 80px;
        height: 2px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--gold),
          transparent
        );
      }

      #btn-theme {
        position: absolute;
        right: 18px;
        top: 50%;
        transform: translateY(-50%);
        background: var(--surface-2);
        border: 1px solid var(--border-strong);
        border-radius: 20px;
        padding: 6px 14px;
        font-size: 18px;
        cursor: pointer;
        transition: all 0.22s;
        color: var(--text-secondary);
        line-height: 1;
      }
      #btn-theme:hover {
        border-color: var(--gold);
        background: var(--surface-3);
      }

      #btn-lang {
        position: absolute;
        right: 76px;
        top: 50%;
        transform: translateY(-50%);
        background: var(--surface-2);
        border: 1px solid var(--border-strong);
        border-radius: 20px;
        padding: 6px 10px;
        font-size: 15px;
        cursor: pointer;
        transition: all 0.22s;
        line-height: 1;
      }
      #btn-lang:hover {
        border-color: var(--gold);
        background: var(--surface-3);
      }

      #btn-logout {
        position: absolute;
        right: 140px;
        top: 50%;
        transform: translateY(-50%);
        background: var(--surface-2);
        border: 1px solid var(--border-strong);
        border-radius: 20px;
        padding: 6px 14px;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.22s;
        color: var(--text-secondary);
        font-family: 'Cinzel', serif;
        letter-spacing: 0.05em;
        line-height: 1;
      }
      #btn-logout:hover {
        border-color: var(--gold);
        background: var(--surface-3);
        color: var(--gold-bright);
      }

      /* =============================================
           LAYOUT
        ============================================= */
      #layout-principal {
        display: grid;
        grid-template-columns: 1fr 320px;
        gap: 0;
        max-width: 1400px;
        margin: 0 auto;
        position: relative;
        z-index: 1;
        min-height: calc(100vh - 70px);
      }

      /* =============================================
           COLONNE GAUCHE
        ============================================= */
      #colonne-gauche {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        padding: 12px 18px;
        min-width: 0;
      }

      #menu-fichier {
        background: var(--surface-2);
        border: 1px solid var(--border-strong);
        border-radius: var(--radius);
        padding: 22px 30px;
        text-align: center;
        box-shadow: var(--shadow);
        width: 100%;
        max-width: 420px;
      }

      #menu-fichier p {
        font-family: 'Cinzel', serif;
        font-size: 13px;
        letter-spacing: 0.12em;
        color: var(--text-muted);
        margin-bottom: 14px;
        text-transform: uppercase;
      }

      .file-input-wrapper {
        position: relative;
        display: inline-block;
      }

      #sgf-file {
        position: absolute;
        opacity: 0;
        width: 100%;
        height: 100%;
        cursor: pointer;
        z-index: 2;
      }

      .file-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 11px 26px;
        background: linear-gradient(135deg, var(--wood-dark), var(--wood));
        border: 1px solid var(--gold);
        border-radius: var(--radius);
        color: var(--gold-bright);
        font-family: 'Cinzel', serif;
        font-size: 15px;
        letter-spacing: 0.08em;
        cursor: pointer;
        transition: all 0.25s;
        box-shadow:
          0 2px 14px rgba(0, 0, 0, 0.3),
          inset 0 1px 0 rgba(255, 255, 255, 0.1);
      }
      .file-btn:hover {
        background: linear-gradient(135deg, var(--wood), var(--wood-light));
        box-shadow: 0 4px 20px rgba(212, 160, 23, 0.25);
        transform: translateY(-1px);
      }

      #file-name-display {
        margin-top: 10px;
        font-size: 13px;
        color: var(--text-muted);
        font-style: italic;
      }

      #actions-exercice {
        display: none;
        width: 100%;
        max-width: 620px;
      }

      #barre-controles {
        background: var(--surface-2);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 10px 14px;
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        box-shadow: var(--shadow);
      }

      #camp-label {
        font-family: 'Cinzel', serif;
        font-size: 12px;
        letter-spacing: 0.1em;
        color: var(--text-muted);
        text-transform: uppercase;
      }

      .custom-select {
        position: relative;
        user-select: none;
        cursor: pointer;
      }

      .custom-select-trigger {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 7px 12px;
        background: var(--surface-3);
        border: 1px solid var(--border-strong);
        border-radius: var(--radius);
        font-family: 'Crimson Pro', serif;
        font-size: 17px;
        color: var(--text-primary);
        transition: border-color 0.2s;
        min-width: 110px;
      }
      .custom-select.open .custom-select-trigger {
        border-color: var(--gold);
      }

      .select-arrow {
        font-size: 11px;
        color: var(--text-muted);
        margin-left: auto;
        transition: transform 0.2s;
      }
      .custom-select.open .select-arrow {
        transform: rotate(180deg);
      }

      .custom-select-dropdown {
        display: none;
        position: absolute;
        top: calc(100% + 4px);
        left: 0;
        min-width: 100%;
        background: var(--surface-2);
        border: 1px solid var(--border-strong);
        border-radius: var(--radius);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        z-index: 100;
        overflow: hidden;
      }
      .custom-select.open .custom-select-dropdown {
        display: block;
      }

      .custom-option {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 9px 14px;
        font-family: 'Crimson Pro', serif;
        font-size: 17px;
        color: var(--text-primary);
        transition: background 0.15s;
        cursor: pointer;
        white-space: nowrap;
      }
      .custom-option:hover {
        background: var(--row-hover);
      }
      .custom-option.selected {
        color: var(--gold-bright);
      }

      .stone-icon {
        display: inline-block;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .stone-noir {
        background: radial-gradient(circle at 35% 35%, #555, #000);
        box-shadow:
          inset -1px -1px 3px rgba(255, 255, 255, 0.15),
          0 1px 3px rgba(0, 0, 0, 0.6);
      }
      .stone-blanc {
        background: radial-gradient(circle at 35% 35%, #fff, #ccc);
        box-shadow:
          inset -1px -1px 3px rgba(0, 0, 0, 0.2),
          0 1px 3px rgba(0, 0, 0, 0.4);
      }

      #compteur-vies {
        display: flex;
        gap: 6px;
        align-items: center;
        margin-left: auto;
      }

      .vie {
        font-size: 22px; /* Taille du coeur */
        color: var(--danger); /* Couleur de base (rouge foncé) */
        text-shadow: 0 0 8px rgba(140, 48, 48, 0.6); /* Effet de lueur */
        transition: all 0.3s;
        line-height: 1;
        user-select: none; /* Empêche de le surligner par erreur au clic */
      }

      .vie.perdue {
        color: var(--surface-4); /* Gris foncé/marron quand la vie est perdue */
        text-shadow: none;
      }

      .vie.flash {
        animation: vieFlash 0.4s ease;
      }

      @keyframes vieFlash {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.4);
          color: #ff5555; /* Rouge vif pendant le clignotement */
          text-shadow: 0 0 18px rgba(255, 80, 80, 0.9);
        }
      }

      #btn-solution {
        padding: 8px 16px;
        background: transparent;
        border: 1px solid rgba(140, 48, 48, 0.45);
        border-radius: var(--radius);
        color: #b07070;
        font-family: 'Crimson Pro', serif;
        font-size: 16px;
        cursor: pointer;
        transition: all 0.22s;
      }
      #btn-solution:hover {
        background: rgba(140, 48, 48, 0.15);
        border-color: #c06060;
        color: #e09090;
      }

      #btn-son {
        padding: 7px 11px;
        background: transparent;
        border: 1px solid var(--border-strong);
        border-radius: var(--radius);
        font-size: 16px;
        cursor: pointer;
        transition: all 0.22s;
        line-height: 1;
      }
      #btn-son:hover {
        background: var(--surface-3);
      }
      #btn-son.mute {
        opacity: 0.4;
      }

      #info-variation {
        display: none;
        width: 100%;
        max-width: 620px;
        text-align: center;
      }

      #info-nom {
        font-family: 'Cinzel', serif;
        font-size: 18px;
        color: var(--gold-bright);
        letter-spacing: 0.07em;
        text-shadow: 0 0 20px rgba(212, 160, 23, 0.3);
      }
      #info-comment {
        font-style: italic;
        color: var(--text-secondary);
        font-size: 16px;
        margin-top: 4px;
        line-height: 1.5;
      }

      #commentaire-sgf {
        display: none;
        background: var(--surface-1);
        border: 1px solid var(--border);
        border-left: 3px solid var(--gold);
        border-radius: var(--radius);
        padding: 12px 16px;
        font-style: italic;
        color: var(--text-secondary);
        font-size: 15px;
        line-height: 1.6;
        box-shadow: var(--shadow);
        animation: fadeSlide 0.35s ease;
      }

      @keyframes fadeSlide {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      #goban-wrapper {
        position: relative;
        width: 100%;
        max-width: 620px;
        display: flex;
        justify-content: center;
      }

      #toast-container {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
        display: flex;
        flex-direction: column;
        gap: 7px;
        pointer-events: none;
      }

      #goban {
        background-color: var(--board);
        box-shadow:
          0 0 0 3px var(--goban-ring1),
          0 0 0 5px var(--goban-ring2),
          0 12px 48px var(--goban-glow),
          0 0 60px rgba(139, 105, 20, 0.12);
        border-radius: 2px;
        display: block;
      }

      #goban-wrapper.ordi-pense::after {
        content: '';
        position: absolute;
        inset: -7px;
        border-radius: 4px;
        border: 2px solid var(--gold);
        opacity: 0;
        animation: ordiPulse 1.2s ease-in-out infinite;
        pointer-events: none;
      }

      @keyframes ordiPulse {
        0%,
        100% {
          opacity: 0;
        }
        50% {
          opacity: 0.35;
        }
      }

      #message-fin {
        display: none;
        width: 100%;
        max-width: 620px;
        border-radius: var(--radius);
        overflow: hidden;
        animation: slideUp 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .fin-inner {
        padding: 16px 20px;
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .fin-icone {
        font-size: 34px;
        flex-shrink: 0;
      }
      .fin-texte h2 {
        font-family: 'Cinzel', serif;
        font-size: 18px;
        letter-spacing: 0.05em;
      }
      .fin-texte p {
        font-size: 15px;
        opacity: 0.75;
        margin-top: 2px;
      }

      #btn-suivante {
        margin-left: auto;
        flex-shrink: 0;
        padding: 10px 20px;
        border-radius: var(--radius);
        border: none;
        font-family: 'Cinzel', serif;
        font-size: 14px;
        letter-spacing: 0.06em;
        cursor: pointer;
        transition: all 0.22s;
      }
      #btn-suivante:hover {
        filter: brightness(1.12);
        transform: translateY(-1px);
      }

      .fin-parfaite {
        background: linear-gradient(
          135deg,
          rgba(74, 140, 63, 0.22),
          rgba(74, 140, 63, 0.08)
        );
        border: 1px solid rgba(74, 140, 63, 0.42);
      }
      .fin-parfaite h2 {
        color: #80cc70;
      }
      .fin-parfaite #btn-suivante {
        background: var(--ok);
        color: white;
      }

      .fin-erreurs {
        background: linear-gradient(
          135deg,
          rgba(184, 115, 51, 0.22),
          rgba(184, 115, 51, 0.08)
        );
        border: 1px solid rgba(184, 115, 51, 0.42);
      }
      .fin-erreurs h2 {
        color: #e8a060;
      }
      .fin-erreurs #btn-suivante {
        background: var(--warn);
        color: white;
      }

      .fin-echec {
        background: linear-gradient(
          135deg,
          rgba(140, 48, 48, 0.22),
          rgba(140, 48, 48, 0.08)
        );
        border: 1px solid rgba(140, 48, 48, 0.42);
      }
      .fin-echec h2 {
        color: #e08080;
      }
      .fin-echec #btn-suivante {
        background: var(--danger);
        color: white;
      }

      .fin-visu {
        background: linear-gradient(
          135deg,
          rgba(44, 96, 128, 0.22),
          rgba(44, 96, 128, 0.08)
        );
        border: 1px solid rgba(44, 96, 128, 0.42);
      }
      .fin-visu h2 {
        color: #70a8cc;
      }
      .fin-visu #btn-suivante {
        background: var(--info);
        color: white;
      }

      /* =============================================
           COLONNE DROITE
        ============================================= */
      #colonne-droite {
        display: none;
        flex-direction: column;
        gap: 14px;
        padding: 18px 18px 18px 0;
        min-width: 0;
        position: sticky;
        top: 0;
        max-height: calc(100vh - 70px);
        overflow-y: auto;
      }

      #colonne-droite::-webkit-scrollbar {
        width: 4px;
      }
      #colonne-droite::-webkit-scrollbar-thumb {
        background: var(--surface-4);
        border-radius: 2px;
      }

      .panel {
        background: var(--surface-1);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
        box-shadow: var(--shadow);
        transition:
          background 0.35s,
          border-color 0.35s;
      }

      .panel-header {
        padding: 10px 15px;
        border-bottom: 1px solid var(--border);
        background: var(--panel-bg);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .panel-title {
        font-family: 'Cinzel', serif;
        font-size: 12px;
        letter-spacing: 0.14em;
        color: var(--text-muted);
        text-transform: uppercase;
      }

      .btn-upload {
        cursor: pointer;
        background: var(--surface-3);
        border: 1px solid var(--border-strong);
        border-radius: 50%;
        width: 26px;
        height: 26px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 18px;
        line-height: 1;
        color: var(--gold-bright);
        transition: all 0.2s;
      }
      .btn-upload:hover {
        background: var(--surface-4);
        border-color: var(--gold);
      }

      .sgf-item {
        display: flex;
        align-items: center;
        padding: 8px 14px;
        gap: 10px;

      /* =============================================
           TOASTS
        ============================================= */
      .toast {
        padding: 10px 20px;
        border-radius: var(--radius);
        font-family: 'Cinzel', serif;
        font-size: 14px;
        letter-spacing: 0.07em;
        backdrop-filter: blur(14px);
        animation: toastIn 0.3s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        white-space: nowrap;
      }
      .toast.out {
        animation: toastOut 0.28s ease forwards;
      }
      .toast-erreur {
        background: rgba(140, 48, 48, 0.9);
        border: 1px solid rgba(200, 80, 80, 0.45);
        color: #ffb8b8;
      }
      .toast-warn {
        background: rgba(184, 115, 51, 0.9);
        border: 1px solid rgba(220, 150, 60, 0.45);
        color: #ffd0a0;
      }
      .toast-correct {
        background: rgba(74, 140, 63, 0.9);
        border: 1px solid rgba(100, 200, 80, 0.45);
        color: #b8ffb8;
      }

      @keyframes toastIn {
        from {
          opacity: 0;
          transform: translateY(-14px) scale(0.95);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      @keyframes toastOut {
        from {
          opacity: 1;
        }
        to {
          opacity: 0;
          transform: translateY(-8px);
        }
      }

      .shake {
        animation: shake 0.35s cubic-bezier(0.36, 0.07, 0.19, 0.97);
      }
      @keyframes shake {
        10%,
        90% {
          transform: translateX(-2px);
        }
        20%,
        80% {
          transform: translateX(4px);
        }
        30%,
        50%,
        70% {
          transform: translateX(-4px);
        }
        40%,
        60% {
          transform: translateX(4px);
        }
      }

      ::selection {
        background: rgba(212, 160, 23, 0.28);

      .btn-action:disabled {

      }

      document.getElementById('stat-label-vert').textContent =
        t('stat_parfait');
      document.getElementById('panel-variations-titre').textContent =
        t('variations_titre');
      document.getElementById('th-etat').textContent = t('variations_etat');
      document.getElementById('th-nom').textContent = t('variations_nom');
      document.getElementById('th-voir').textContent = t('variations_voir');
      document.getElementById('btn-quitter-presentation').textContent =
        '✕ ' + t('btn_quitter_presentation');
      document.getElementById('btn-son').title = t('son_titre');
      document.getElementById('btn-admin').textContent = t('header_admin');
      document.getElementById('lien-legales').textContent =
        t('mentions_legales');
      document.getElementById('lien-aide').textContent = t('lien_aide');
      document.getElementById('lien-legales').textContent =
        t('mentions_legales');
      document.getElementById('lien-aide').textContent = t('lien_aide');
      document.getElementById('lien-creer-sgf').textContent =
        t('lien_creer_sgf');

      // ── Bouton langue ──
      const btnLang = document.getElementById('btn-lang');
      btnLang.textContent = lang === 'fr' ? '🇬🇧' : '🇫🇷';
      btnLang.title =
        lang === 'fr' ? 'Switch to English' : 'Passer en français';
      btnLang.addEventListener('click', () =>
        setLang(lang === 'fr' ? 'en' : 'fr')
      );

      // ── État session ──
      const user = await getUser();
      const estConnecte = !!user;

      // ── Header selon session ──
      if (estConnecte) {
        const pseudo = user.user_metadata?.pseudo || user.email.split('@')[0];
        const headerTitles = document.querySelector('.header-titles');
        const span = document.createElement('div');
        span.style.cssText =
          'font-size:12px; color:var(--text-muted); margin-top:2px; font-style:italic; letter-spacing:0.05em;';
        span.textContent = '⛩ ' + pseudo;
        headerTitles.appendChild(span);

        isAdmin().then((admin) => {
          if (admin) {
            const btn = document.getElementById('btn-admin');
            btn.style.display = 'block';
            btn.addEventListener(
              'click',
              () => (window.location.href = './admin.html')
            );
          }
        });

        document.getElementById('btn-logout').textContent = t('header_quitter');
        document.getElementById('btn-logout').title = t('deconnexion_title');
        document
          .getElementById('btn-logout')
          .addEventListener('click', async () => {
            await supabase.auth.signOut();
            window.location.href = './index.html';
          });
      } else {
        document.getElementById('btn-logout').textContent =
          t('header_connexion');
        document.getElementById('btn-logout').title = t('connexion_title');
        document.getElementById('btn-logout').addEventListener('click', () => {
          window.location.href = './auth.html';
        });

        document.getElementById('panel-sgf-titre').textContent =
          t('bibliotheque_titre');
        document.getElementById('label-upload').style.display = 'none';

        const bandeau = document.createElement('div');
        bandeau.style.cssText =
          'padding: 10px 14px; background: rgba(212,160,23,0.06); border-top: 1px solid var(--border); font-size: 12px; color: var(--text-muted); text-align: center; font-style: italic;';
        bandeau.innerHTML = `<a href="./auth.html" style="color: var(--gold); text-decoration: none;">${t('bibliotheque_creer_compte')}</a>${t('bibliotheque_creer_compte_texte')}`;
        document.getElementById('panel-sgf').appendChild(bandeau);
      }

      // ── État SGF actif ──
      let sgfActifId = null;
      let sgfActifPath = null;

      document.getElementById('colonne-droite').style.display = 'flex';

      // ── Charger et afficher la liste des SGF ──
      async function rafraichirListeSgf() {
        const liste = await listerSgf();
        const container = document.getElementById('liste-sgf');
        container.innerHTML = '';

        if (liste.length === 0) {
          container.innerHTML = estConnecte
            ? `<div id="liste-sgf-vide">${t('bibliotheque_vide_connecte')}</div>`
            : `<div id="liste-sgf-vide">${t('bibliotheque_vide_invite')}</div>`;
          return;
        }

        for (const sgf of liste) {
          const item = document.createElement('div');
          item.className =
            'sgf-item' + (sgf.id === sgfActifId ? ' active' : '');
          item.dataset.id = sgf.id;
          item.dataset.path = sgf.storage_path;

          const left = document.createElement('div');
          left.style.cssText = 'flex:1; min-width:0;';

          const nom = document.createElement('div');
          nom.className = 'sgf-item-name';
          nom.textContent = sgf.name.replace('.sgf', '');
          left.appendChild(nom);
          item.appendChild(left);

          if (sgf.is_shared) {
            const tag = document.createElement('span');
            tag.className = 'sgf-item-shared';
            tag.textContent = t('bibliotheque_partage');
            item.appendChild(tag);
          }

          if (sgf.is_club) {
            const tagClub = document.createElement('span');
            tagClub.className = 'sgf-item-shared';
            tagClub.style.background = 'rgba(212, 160, 23, 0.2)';
            tagClub.style.color = 'var(--gold)';
            tagClub.style.border = '1px solid rgba(212, 160, 23, 0.4)';
            tagClub.textContent = '🛡️ Club';
            item.appendChild(tagClub);
          }

          if (estConnecte && !sgf.is_shared) {
            const btnDel = document.createElement('button');
            btnDel.className = 'sgf-item-delete';
            btnDel.title = t('supprimer');
            btnDel.textContent = '✕';
            btnDel.addEventListener('click', async (e) => {
              e.stopPropagation();
              if (
                !confirm(t('bibliotheque_supprimer_confirm', { nom: sgf.name }))
              )
                return;
              await supprimerSgf(sgf.id, sgf.storage_path);
              if (sgfActifId === sgf.id) {
                sgfActifId = null;
                sgfActifPath = null;

                /* On regrise les boutons et on cache le goban */
                document.getElementById('btn-mode-presentation').disabled =
                  true;
                document.getElementById('btn-reset').disabled = true;
                document.getElementById('goban-wrapper').style.display = 'none';
                document.getElementById('info-variation').style.display =
                  'none';
              }
              rafraichirListeSgf();
            });
            item.appendChild(btnDel);
          }

          item.addEventListener('click', () => chargerSgfDepuisServeur(sgf));
          container.appendChild(item);
        }
      }

      // ── Charger un SGF depuis Supabase Storage ──
      async function chargerSgfDepuisServeur(sgf) {
        document.getElementById('message-accueil').style.display = 'none';
        const contenu = await telechargerSgf(sgf.storage_path);
        if (!contenu) return;

        sgfActifId = sgf.id;
        window._sgfActifId = sgf.id;
        sgfActifPath = sgf.storage_path;

        document
          .querySelectorAll('.sgf-item')
          .forEach((el) => el.classList.remove('active'));
        const item = document.querySelector(`.sgf-item[data-id="${sgf.id}"]`);
        if (item) item.classList.add('active');

        let progression = {};
        if (estConnecte) {
          progression = await chargerProgression(sgf.id);
        } else {
          const local = localStorage.getItem(`progression_${sgf.id}`);
          if (local)
            try {
              progression = JSON.parse(local);
            } catch {}
        }

        window.dispatchEvent(
          new CustomEvent('sgf-charge', {
            detail: { contenu, nom: sgf.name, sgfId: sgf.id, progression },
          })
        );
      }

      // ── Upload (connectés seulement) ──
      if (estConnecte) {
        document
          .getElementById('sgf-upload')
          .addEventListener('change', async function () {
            if (!this.files.length) return;
            const file = this.files[0];
            this.value = '';
            const id = await uploaderSgf(file);
            if (!id) {
              alert(t('erreur_upload'));
              return;
            }
            await rafraichirListeSgf();
            const liste = await listerSgf();
            const sgf = liste.find((s) => s.id === id);
            if (sgf) chargerSgfDepuisServeur(sgf);
          });
      }

      // ── Sauvegarder la progression ──
      window.addEventListener('sauvegarder-variation', async (e) => {
        if (!sgfActifId) return;
        const { sig, statut, nom, commentaire } = e.detail;

        if (estConnecte) {
          const indicator = document.getElementById('sync-indicator');
          indicator.textContent = t('sync_sauvegarde');
          indicator.className = 'saving';
          await sauvegarderVariation(sgfActifId, sig, statut, nom, commentaire);
          indicator.textContent = t('sync_sauvegarde_ok');
          indicator.className = 'saved';
          setTimeout(() => (indicator.className = ''), 2000);
        } else {
          const key = `progression_${sgfActifId}`;
          let progression = {};
          try {
            progression = JSON.parse(localStorage.getItem(key) || '{}');
          } catch {}
          progression[sig] = { statut, nom, commentaire };
          localStorage.setItem(key, JSON.stringify(progression));
        }
      });

      // ── Init ──
      rafraichirListeSgf();
    </script>
  </body>
</html>
