name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 8 */2 * *' # toutes les 48h à 8h UTC
  workflow_dispatch: # permet de lancer manuellement

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            "https://oimidjxvheebxeyspcrw.supabase.co/rest/v1/sgf_files?select=id&limit=1" \
            -H "apikey: sb_publishable_1KT7e01fdf7ItXjTGAdFnw_91WFw_eomFBDw" \
            -H "Authorization: Bearer sb_publishable_1KT7e01fdf7ItXjTGAdFnw_91WFw_eomFBDw"
          echo " — Supabase pingé"
